<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Flight</title>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
  <h1>Edit Flight</h1>

  <form th:action="@{/admin/flights/edit/{id}(id=${flight.flightId})}"
        th:object="${flight}"
        method="post">

    <table>
      <thead>
      <tr>
        <th>Field</th>
        <th>Current Value</th>
        <th>New Value</th>
      </tr>
      </thead>
      <tbody>

      <tr>
        <td>Flight No</td>
        <td th:text="${flight.flightNo}"></td>
        <td><input type="text" th:field="*{flightNo}" required/></td>
      </tr>

      <tr>
        <td>Departure Time</td>
        <td th:text="${flight.scheduledDeparture}"></td>
        <td><input type="datetime-local" th:field="*{scheduledDeparture}" required/></td>
      </tr>

      <tr>
        <td>Arrival Time</td>
        <td th:text="${flight.scheduledArrival}"></td>
        <td><input type="datetime-local" th:field="*{scheduledArrival}" required/></td>
      </tr>

      <tr>
        <td>From</td>
        <td th:text="${flight.departureAirport}"></td>
        <td><input type="text" th:field="*{departureAirport}" required/></td>
      </tr>

      <tr>
        <td>To</td>
        <td th:text="${flight.arrivalAirport}"></td>
        <td><input type="text" th:field="*{arrivalAirport}" required/></td>
      </tr>

      <tr>
        <td>Status</td>
        <td th:text="${flight.status}"></td>
        <td><input type="text" th:field="*{status}" required/></td>
      </tr>

      <tr>
        <td>Aircraft Code</td>
        <td th:text="${flight.aircraftCode}"></td>
        <td><input type="text" th:field="*{aircraftCode}" required/></td>
      </tr>

      </tbody>
    </table>

    <button type="submit" class="btn">Update</button>
  </form>

  <a href="/admin/flights" class="btn">Back</a>
</div>
</body>
</html>
