<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Airport System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <header class="header">
        <h1>✈ Airport System</h1>
        <p>Your portal for flights, bookings, and management</p>
    </header>

    <section class="card">
        <h2>Passenger Services</h2>

        <div class="button-group">
            <a th:href="@{/filters}" class="btn btn-add">
                🔍 Search Flights
            </a>

            <a th:href="@{/user/login}" class="btn btn-edit">
                👤 Login / Cabinet
            </a>

            <a th:href="@{/airports}" class="btn btn-secondary">
                🌍 View Airports
            </a>
        </div>
    </section>

    <section class="card">
        <h2>Administration</h2>

        <div class="button-group">
            <a th:href="@{/admin}" class="btn btn-delete">
                🔐 Admin Panel
            </a>
        </div>
    </section>

    <footer>
        <p>&copy; 2025-2026 Airport System</p>
    </footer>

</div>
</body>
</html>
