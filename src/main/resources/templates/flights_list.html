<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Flight List</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <header class="header">
        <h1>✈ All Flights</h1>
        <div class="actions">
            <a th:href="@{/flights/new}" class="btn btn-add">+ Add Flight</a>
            <a th:href="@{/}" class="btn btn-secondary">Home</a>
        </div>
    </header>

    <div class="table-wrapper">
        <table class="styled-table">
            <thead>
            <tr>
                <th>Flight No</th>
                <th>Route</th>
                <th>Departure</th>
                <th>Arrival</th>
                <th>Status</th>
                <th>Aircraft</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="flight : ${flights}">
                <td>
                    <strong th:text="${flight.flightNo}"></strong>
                </td>

                <td>
                    <span th:text="${flight.departureAirport}"></span>
                    →
                    <span th:text="${flight.arrivalAirport}"></span>
                </td>

                <td th:text="${flight.scheduledDeparture}"></td>
                <td th:text="${flight.scheduledArrival}"></td>

                <td>
                    <span class="status"
                          th:text="${flight.status}"
                          th:classappend="' status-' + ${flight.status.toLowerCase()}">
                    </span>
                </td>

                <td th:text="${flight.aircraftCode}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(flights)}">
                <td colspan="6" style="text-align:center;">
                    No flights available
                </td>
            </tr>

            </tbody>
        </table>
    </div>

    <footer>
        <p>&copy; 2025-2026 Airport System</p>
    </footer>

</div>

</body>
</html>
