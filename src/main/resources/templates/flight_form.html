<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Create Flight</title>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

  <header class="header">
    <h1>✈ Create New Flight</h1>
    <div class="actions">
      <a th:href="@{/flights}" class="btn btn-secondary">Back to Flights</a>
    </div>
  </header>

  <div class="card">

    <form th:action="@{/flights/new}" th:object="${flyingDTO}" method="post" class="form-grid">

      <div class="form-group">
        <label>Flight Number</label>
        <input type="text" th:field="*{flightNo}"
               th:classappend="${#fields.hasErrors('flightNo')} ? 'invalid-input'"/>
        <div class="error" th:if="${#fields.hasErrors('flightNo')}" th:errors="*{flightNo}"></div>
      </div>

      <div class="form-group">
        <label>Departure Airport</label>
        <input type="text" th:field="*{departureAirport}"
               placeholder="e.g. JFK"
               th:classappend="${#fields.hasErrors('departureAirport')} ? 'invalid-input'"/>
        <div class="error" th:if="${#fields.hasErrors('departureAirport')}" th:errors="*{departureAirport}"></div>
      </div>

      <div class="form-group">
        <label>Arrival Airport</label>
        <input type="text" th:field="*{arrivalAirport}"
               placeholder="e.g. LAX"
               th:classappend="${#fields.hasErrors('arrivalAirport')} ? 'invalid-input'"/>
        <div class="error" th:if="${#fields.hasErrors('arrivalAirport')}" th:errors="*{arrivalAirport}"></div>
      </div>

      <div class="form-group">
        <label>Scheduled Departure</label>
        <input type="datetime-local" th:field="*{scheduledDeparture}"
               th:classappend="${#fields.hasErrors('scheduledDeparture')} ? 'invalid-input'"/>
        <div class="error" th:if="${#fields.hasErrors('scheduledDeparture')}" th:errors="*{scheduledDeparture}"></div>
      </div>

      <div class="form-group">
        <label>Scheduled Arrival</label>
        <input type="datetime-local" th:field="*{scheduledArrival}"
               th:classappend="${#fields.hasErrors('scheduledArrival')} ? 'invalid-input'"/>
        <div class="error" th:if="${#fields.hasErrors('scheduledArrival')}" th:errors="*{scheduledArrival}"></div>
      </div>

      <div class="form-group">
        <label>Status</label>
        <input type="text" th:field="*{status}"
               placeholder="Scheduled / Delayed / Cancelled"
               th:classappend="${#fields.hasErrors('status')} ? 'invalid-input'"/>
        <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
      </div>

      <div class="form-group">
        <label>Aircraft Code</label>
        <input type="text" th:field="*{aircraftCode}"
               placeholder="e.g. A320"
               th:classappend="${#fields.hasErrors('aircraftCode')} ? 'invalid-input'"/>
        <div class="error" th:if="${#fields.hasErrors('aircraftCode')}" th:errors="*{aircraftCode}"></div>
      </div>

      <div class="form-group">
        <label>Actual Departure (optional)</label>
        <input type="datetime-local" th:field="*{actualDeparture}"/>
      </div>

      <div class="form-group">
        <label>Actual Arrival (optional)</label>
        <input type="datetime-local" th:field="*{actualArrival}"/>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-add">Create Flight</button>
      </div>

    </form>

  </div>

  <footer>
    <p>&copy; 2025-2026 Airport System</p>
  </footer>

</div>

</body>
</html>
